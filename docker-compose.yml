version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - OPENAGENT_LOG_LEVEL=info
    volumes:
      - openagent-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3200:3000"
    environment:
      - API_URL=http://api:3100
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  openagent-data:
