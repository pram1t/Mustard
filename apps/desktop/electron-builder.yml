appId: com.openagent.desktop
productName: OpenAgent
copyright: Copyright © 2024 OpenAgent Contributors

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - "!node_modules"

extraMetadata:
  main: out/main/index.js

# ── ASAR Configuration ──────────────────────────────────────────────────────
asar: true
asarUnpack:
  - "**/*.node"  # Native modules need to be unpacked

# ── Protocol Handler ────────────────────────────────────────────────────────
protocols:
  - name: OpenAgent
    schemes:
      - openagent

# ── Windows ─────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: resources/icon.ico
  # Code signing: set CSC_LINK and CSC_KEY_PASSWORD env vars
  signingHashAlgorithms:
    - sha256
  sign: null  # Uses default Windows signing when CSC_LINK is set
  publisherName: OpenAgent

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenAgent
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}

# ── macOS ───────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization: set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  notarize: false  # Enable when Apple credentials are configured

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Linux ───────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: Development
  mimeTypes:
    - x-scheme-handler/openagent
  desktop:
    StartupNotify: "true"
    Terminal: "false"
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Publish Configuration ──────────────────────────────────────────────────
publish:
  provider: github
  owner: pram1t
  repo: OpenAgent
  releaseType: draft

# ── After Sign Hook ────────────────────────────────────────────────────────
# afterSign: scripts/configure-fuses.ts  # Enable after @electron/fuses is installed
