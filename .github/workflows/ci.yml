name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Note: desktop app has its own pipeline (desktop.yml) — this CI only
# covers the publishable packages + apps/web + the test suite.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Force fresh resolve to pick up @rollup/rollup-linux-x64-gnu
      # (optional dep that's missing from a Windows-generated lockfile).
      - run: rm -f package-lock.json && npm install
      - name: Build (excluding desktop + web)
        run: npx turbo run build --filter='!@pram1t/mustard-desktop' --filter='!@pram1t/mustard-web'

  test:
    name: Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Force fresh resolve to pick up @rollup/rollup-linux-x64-gnu
      # (optional dep that's missing from a Windows-generated lockfile).
      - run: rm -f package-lock.json && npm install
      - name: Build (excluding desktop + web)
        run: npx turbo run build --filter='!@pram1t/mustard-desktop' --filter='!@pram1t/mustard-web'

      - name: Run tests (excluding desktop + web)
        run: npx vitest run --exclude='**/apps/desktop/**' --exclude='**/apps/web/**'
        env:
          CI: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Force fresh resolve to pick up @rollup/rollup-linux-x64-gnu
      # (optional dep that's missing from a Windows-generated lockfile).
      - run: rm -f package-lock.json && npm install
      - name: Build (excluding desktop + web)
        run: npx turbo run build --filter='!@pram1t/mustard-desktop' --filter='!@pram1t/mustard-web'
      - run: npm run lint
        continue-on-error: true
