name: Desktop CI

# DISABLED for Mustard polish-v1 cycle (2026-05-02).
# The desktop app needs platform-specific Electron build deps that
# aren't installed on standard GitHub runners. Re-enable + fix in the
# v1.1 polish cycle dedicated to desktop polish.
#
# To re-enable: change the trigger from `workflow_dispatch` back to
# the original `push` + `pull_request` config (preserved below).

on:
  workflow_dispatch:
  # push:
  #   branches: [main, master]
  #   paths:
  #     - 'apps/desktop/**'
  #     - 'packages/core/**'
  #     - 'packages/config/**'
  #     - 'packages/llm/**'
  #     - 'packages/tools/**'
  #     - 'packages/mcp/**'
  # pull_request:
  #   paths:
  #     - 'apps/desktop/**'
  #     - 'packages/core/**'
  #     - 'packages/config/**'
  #     - 'packages/llm/**'
  #     - 'packages/tools/**'
  #     - 'packages/mcp/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build all workspace packages
        run: npm run build

      - name: Type check desktop
        run: npm run typecheck --workspace=@pram1t/mustard-desktop

      - name: Run desktop tests
        run: npx vitest run --config apps/desktop/vitest.config.ts

      - name: Verify Electron version pinned
        run: npx tsx apps/desktop/scripts/check-electron-version.ts

  package:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix 7zip-bin permissions
        if: runner.os != 'Windows'
        run: |
          chmod +x node_modules/7zip-bin/linux/x64/7za 2>/dev/null || true
          chmod +x node_modules/7zip-bin/linux/ia32/7za 2>/dev/null || true
          chmod +x node_modules/7zip-bin/mac/arm64/7za 2>/dev/null || true
          chmod +x node_modules/7zip-bin/mac/x64/7za 2>/dev/null || true

      - name: Build all packages
        run: npm run build

      - name: Package (no signing)
        run: npx electron-builder --config electron-builder.yml --dir
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/release/
          retention-days: 7
