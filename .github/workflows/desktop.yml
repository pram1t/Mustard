name: Desktop CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/desktop/**'
      - 'packages/core/**'
      - 'packages/config/**'
      - 'packages/llm/**'
      - 'packages/tools/**'
      - 'packages/mcp/**'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/core/**'
      - 'packages/config/**'
      - 'packages/llm/**'
      - 'packages/tools/**'
      - 'packages/mcp/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: npm run typecheck --workspace=openagent-desktop

      - name: Run tests
        run: npx vitest run --config apps/desktop/vitest.config.ts

      - name: Build
        run: npm run build --workspace=openagent-desktop

      - name: Verify Electron version pinned
        run: npx tsx apps/desktop/scripts/check-electron-version.ts

  build:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build --workspace=openagent-desktop

      - name: Package (no signing)
        run: npx electron-builder --config apps/desktop/electron-builder.yml --dir
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/release/
          retention-days: 7
