name: Desktop CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'packages/core/**'
      - 'packages/config/**'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/core/**'
      - 'packages/config/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: npx turbo run typecheck --filter=openagent-desktop

      - name: Build
        run: npx turbo run build --filter=openagent-desktop

      - name: Verify Electron version pinned
        run: npx tsx apps/desktop/scripts/check-electron-version.ts
